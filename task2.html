<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المهمة الثانية</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="screen">
    <div class="card">
      <div class="steps">
        <div class="step-dot done"></div>
        <div class="step-dot active"></div>
      </div>
      <div class="transition-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
      </div>
      <div class="step-label">الخطوة ٢ من ٢</div>
      <h2>المهمة الثانية</h2>
      <p class="body-text" style="margin-bottom:28px;">ستبدأ الآن المهمة الأخيرة والتي تعتمد على الانتباه واليقظة، اقرأ التعليمات جيّدًا وابدأ.</p>
      
      <button class="btn btn-primary" onclick="openTask2()">
        ابدأ المهمة
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
    </div>
  </div>

  <script>
    function openTask2() {
      const code = localStorage.getItem('participantCode') || '0000';
      const url = 'https://www.psytoolkit.org/c/3.6.9/survey?s=rB9F6&participant=' + code;
      
      window.open(url, '_blank');
      
      setTimeout(() => {
        window.location.href = 'done.html';
      }, 1500);
    }
  </script>
</body>
</html>
