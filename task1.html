<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>المهمة الأولى</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="screen">
    <div class="card">
      <div class="steps">
        <div class="step-dot active"></div>
        <div class="step-dot"></div>
      </div>
      <div class="transition-icon">
        <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><polygon points="10 8 16 12 10 16 10 8"/></svg>
      </div>
      <div class="step-label">الخطوة ١ من ٢</div>
      <h2>المهمة التفاعلية الأولى</h2>
      <p class="body-text" style="margin-bottom:28px;">ستبدأ الآن مهمة تفاعلية تعتمد على الاستجابة البصرية. قبل البدء تأكد من مستوى الصوت وركز أثناء الإجابة.</p>
      
      <button class="btn btn-primary" onclick="openTask1()">
        ابدأ المهمة
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
    </div>
  </div>

  <script>
    function openTask1() {
      // استرجاع الكود من الذاكرة، وإذا لم يوجد نضع 0000 كاحتياط
      const code = localStorage.getItem('participantCode') || '0000';
      const url = 'https://www.psytoolkit.org/c/3.6.9/survey?s=3mwNy&participant=' + code;
      
      // فتح الاختبار في نافذة جديدة
      window.open(url, '_blank');
      
      // نقل المستخدم للصفحة التالية في هذه النافذة
      setTimeout(() => {
        window.location.href = 'task2.html';
      }, 1500);
    }
  </script>
</body>
</html>
