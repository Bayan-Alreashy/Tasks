<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>رمز المشاركة</title>
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="screen">
    <div class="card">
      <div class="mark">
        <svg viewBox="0 0 24 24"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
      </div>
      <h2>رمز المشاركة</h2>
      <p class="body-text" style="margin-bottom:20px;">هذا الرمز يُستخدم لربط إجاباتك بشكل مجهول الهوية.</p>

      <label class="input-label" for="codeInput">أدخل آخر ٤ أرقام من رقم هاتفك</label>
      <p class="input-hint"> مثال: إذا رقمك ينتهي بـ ٥٦٧٨ أدخل 5678 باللغة الإنجليزية</p>
      <input class="code-input" id="codeInput" type="tel" maxlength="4" placeholder="_ _ _ _" autocomplete="off" />
      <p class="error-msg" id="codeError">الرجاء إدخال ٤ أرقام باللغة الإنجليزية</p>

      <button class="btn btn-primary" onclick="submitCode()">
        ابدأ المهام
        <svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg>
      </button>
    </div>
  </div>

  <script>
    function submitCode() {
      const input = document.getElementById('codeInput');
      const val = input.value.trim();
      if (!/^\d{4}$/.test(val)) {
        document.getElementById('codeError').classList.add('show');
        return;
      }
      // هنا نقوم بحفظ الرقم في ذاكرة المتصفح لينتقل معه للصفحات القادمة
      localStorage.setItem('participantCode', val);
      window.location.href = 'task1.html';
    }
    
    document.getElementById('codeInput').addEventListener('input', function() {
      this.value = this.value.replace(/\D/g, '').slice(0, 4);
    });
  </script>
</body>
</html>
